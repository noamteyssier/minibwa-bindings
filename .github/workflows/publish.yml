name: Manage Release PRs and Publish Crates

# Required org secrets:
#   FG_LABS_BOT_APP_ID      — GitHub App ID for the fg-labs bot
#   FG_LABS_BOT_PRIVATE_KEY — GitHub App private key (PEM)
# Crates.io auth uses Trusted Publishing (OIDC); no CARGO_REGISTRY_TOKEN secret needed.

permissions:
  contents: read

on:
  push:
    branches: [main]

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.FG_LABS_BOT_APP_ID }}
          private-key: ${{ secrets.FG_LABS_BOT_PRIVATE_KEY }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Create or update release PR
        uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11 # v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.FG_LABS_BOT_APP_ID }}
          private-key: ${{ secrets.FG_LABS_BOT_PRIVATE_KEY }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y build-essential zlib1g-dev
      - name: Authenticate to crates.io via Trusted Publishing
        id: crates-auth
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
      - name: Verify lockstep workspace versions
        run: |
          set -euo pipefail
          WORKSPACE_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r \
            '.packages[] | select(.name == "minibwa") | .version')
          MISMATCHES=$(cargo metadata --no-deps --format-version 1 | jq -r \
            --arg ver "$WORKSPACE_VERSION" \
            '.packages[] | select(.name | startswith("minibwa")) | select(.version != $ver) | "\(.name) \(.version)"')
          if [ -n "$MISMATCHES" ]; then
            echo "ERROR: workspace version drift detected (expected $WORKSPACE_VERSION):"
            echo "$MISMATCHES"
            exit 1
          fi
          echo "All workspace crates at v$WORKSPACE_VERSION"
      - name: Publish workspace crates in dependency order
        id: publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}
        run: |
          set -euo pipefail
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r \
            '.packages[] | select(.name == "minibwa") | .version')
          PUBLISHED_VERSION=$(curl -sS \
            -H "User-Agent: minibwa-bindings-ci (https://github.com/fg-labs/minibwa-bindings)" \
            "https://crates.io/api/v1/crates/minibwa" | jq -r \
            '.crate.max_version // "0.0.0"')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if [ "$VERSION" = "$PUBLISHED_VERSION" ]; then
            echo "All crates already at v$VERSION -- nothing to publish"
            echo "published=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Publish leaves before root: minibwa-sys has no workspace deps,
          # minibwa depends on minibwa-sys.
          # minibwa-py is excluded (standalone crate; wheel published via pypi.yml).
          CRATES=(
            minibwa-sys
            minibwa
          )
          for crate in "${CRATES[@]}"; do
            CRATE_MAX_VERSION=$(curl -sS \
              -H "User-Agent: minibwa-bindings-ci (https://github.com/fg-labs/minibwa-bindings)" \
              "https://crates.io/api/v1/crates/${crate}" | jq -r \
              '.crate.max_version // "0.0.0"')
            if [ "$CRATE_MAX_VERSION" = "$VERSION" ]; then
              echo "$crate v$VERSION already exists on crates.io -- skipping"
              continue
            fi
            echo "Publishing $crate v$VERSION..."
            cargo publish -p "$crate"
            echo "Published $crate v$VERSION"
          done
          echo "published=true" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.publish.outputs.published == 'true'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.publish.outputs.version }}"
          TAG="v${VERSION}"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
          fi
          if ! git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            git push origin "$TAG"
          fi
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "v${VERSION}" \
              --generate-notes \
              --latest
          else
            echo "Release $TAG already exists -- skipping"
          fi
